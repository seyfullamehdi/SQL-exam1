<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle SQL İmtahan - JOIN'ə qədər</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e2d45;
  --accent: #a78bfa;
  --accent2: #f472b6;
  --success: #00e676;
  --danger: #ff4d6d;
  --warning: #ffd166;
  --text: #e8edf5;
  --text2: #8899aa;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(167,139,250,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(244,114,182,0.05) 0%, transparent 50%);
}
.screen { display:none; }
.screen.active { display:block; }

/* LOGIN */
#loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
#loginScreen.active { display:flex; }
.login-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:48px 40px; width:100%; max-width:480px; position:relative; overflow:hidden;
}
.login-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.logo-area { text-align:center; margin-bottom:36px; }
.logo-icon { width:64px;height:64px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:16px; }
.logo-area h1 { font-size:26px; font-weight:800; letter-spacing:-0.5px; }
.logo-area p { color:var(--text2); font-size:14px; margin-top:6px; font-family:'Space Mono',monospace; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.form-group input { width:100%; padding:14px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'Syne',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; }
.form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(167,139,250,0.1); }
.info-bar { display:flex; gap:12px; margin-bottom:28px; }
.info-chip { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.info-chip .val { font-size:20px; font-weight:800; color:var(--accent); font-family:'Space Mono',monospace; }
.info-chip .lbl { font-size:11px; color:var(--text2); margin-top:2px; }
.btn-start { width:100%; padding:16px; background:linear-gradient(135deg,var(--accent),#7c3aed); border:none; border-radius:var(--radius); color:#fff; font-family:'Syne',sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; }
.btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(167,139,250,0.3); }
.err-msg { color:var(--danger); font-size:13px; margin-top:6px; display:none; }

/* EXAM */
#examScreen { padding:0; }
#examScreen.active { display:block; }
.exam-header { position:sticky; top:0; z-index:100; background:rgba(10,14,26,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.exam-title-sm { font-weight:700; font-size:15px; color:var(--accent); }
.timer-block { display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:8px 16px; }
.timer-val { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); min-width:80px; transition:color 0.3s; }
.timer-val.warn { color:var(--warning); }
.timer-val.danger { color:var(--danger); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.5;} }
.progress-wrap { flex:1; max-width:300px; }
.progress-info { display:flex; justify-content:space-between; font-size:12px; color:var(--text2); margin-bottom:4px; font-family:'Space Mono',monospace; }
.progress-bar { height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width 0.4s; }
.exam-body { max-width:820px; margin:0 auto; padding:32px 20px 80px; }
.question-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; margin-bottom:24px; overflow:hidden; transition:border-color 0.2s; }
.question-card:hover { border-color:rgba(167,139,250,0.3); }
.q-header { display:flex; align-items:flex-start; gap:14px; padding:20px 20px 0; }
.q-num { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-weight:800; font-size:12px; padding:4px 10px; border-radius:6px; white-space:nowrap; font-family:'Space Mono',monospace; flex-shrink:0; margin-top:2px; }
.q-text { font-size:15px; line-height:1.65; font-weight:500; }
.q-note { font-size:12px; color:var(--accent2); font-style:italic; margin-top:4px; }
.options { padding:16px 20px 20px; display:flex; flex-direction:column; gap:10px; }
.opt-label { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:all 0.15s; font-size:14px; line-height:1.5; }
.opt-label:hover { border-color:rgba(167,139,250,0.4); background:rgba(167,139,250,0.05); }
.opt-label input { accent-color:var(--accent); width:16px; height:16px; flex-shrink:0; margin-top:2px; }
.opt-label.selected { border-color:var(--accent); background:rgba(167,139,250,0.08); }
.submit-area { text-align:center; padding:20px; }
.btn-submit { padding:16px 48px; background:linear-gradient(135deg,var(--accent2),#be185d); border:none; border-radius:var(--radius); color:#fff; font-family:'Syne',sans-serif; font-size:17px; font-weight:800; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; }
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(244,114,182,0.4); }

/* RESULT */
#resultScreen { padding:0; }
#resultScreen.active { display:block; }
.result-header { background:var(--surface); border-bottom:1px solid var(--border); padding:32px 24px; text-align:center; position:relative; overflow:hidden; }
.result-header::before { content:''; position:absolute; top:0;left:0;right:0; height:4px; background:linear-gradient(90deg,var(--accent),var(--accent2),var(--success)); }
.student-info-res { font-size:14px; color:var(--text2); margin-bottom:8px; font-family:'Space Mono',monospace; }
.score-circle { width:140px;height:140px; border-radius:50%; margin:20px auto; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:800; position:relative; }
.score-circle.pass { background:conic-gradient(var(--success) calc(var(--pct)*1%),var(--surface2) 0); box-shadow:0 0 40px rgba(0,230,118,0.3); }
.score-circle.fail { background:conic-gradient(var(--danger) calc(var(--pct)*1%),var(--surface2) 0); box-shadow:0 0 40px rgba(255,77,109,0.3); }
.score-inner { background:var(--bg); width:110px;height:110px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-num { font-size:30px; font-family:'Space Mono',monospace; }
.score-label { font-size:11px; color:var(--text2); }
.verdict { font-size:28px; font-weight:800; margin:8px 0 4px; }
.verdict.pass { color:var(--success); }
.verdict.fail { color:var(--danger); }
.motivate { font-size:15px; color:var(--text2); max-width:420px; margin:0 auto 8px; }
.stats-row { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin-top:16px; }
.stat-chip { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 20px; text-align:center; }
.stat-chip .sv { font-size:22px; font-weight:800; font-family:'Space Mono',monospace; }
.stat-chip .sl { font-size:11px; color:var(--text2); margin-top:2px; }
.result-body { max-width:900px; margin:0 auto; padding:32px 20px 60px; }
.section-title { font-size:20px; font-weight:800; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.topics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; margin-bottom:40px; }
.topic-chip { background:rgba(255,77,109,0.08); border:1px solid rgba(255,77,109,0.3); border-radius:10px; padding:14px; }
.topic-chip .tc-name { font-weight:700; font-size:14px; margin-bottom:4px; }
.topic-chip .tc-count { font-size:12px; color:var(--danger); font-family:'Space Mono',monospace; }
.review-card { background:var(--surface); border-radius:14px; margin-bottom:16px; overflow:hidden; border:1px solid var(--border); }
.review-card.correct { border-left:4px solid var(--success); }
.review-card.wrong { border-left:4px solid var(--danger); }
.review-card.unanswered { border-left:4px solid var(--text2); }
.review-q-head { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; }
.review-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:6px; font-family:'Space Mono',monospace; }
.badge-correct { background:rgba(0,230,118,0.15); color:var(--success); }
.badge-wrong { background:rgba(255,77,109,0.15); color:var(--danger); }
.badge-unanswered { background:rgba(136,153,170,0.15); color:var(--text2); }
.review-q-text { font-size:14px; font-weight:600; line-height:1.5; }
.review-opts { padding:0 16px 14px; display:flex; flex-direction:column; gap:6px; }
.review-opt { font-size:13px; padding:8px 12px; border-radius:8px; line-height:1.4; background:var(--surface2); border:1px solid transparent; }
.review-opt.r-correct { background:rgba(0,230,118,0.1); border-color:rgba(0,230,118,0.4); color:var(--success); }
.review-opt.r-wrong-sel { background:rgba(255,77,109,0.1); border-color:rgba(255,77,109,0.4); color:var(--danger); }
.btn-top { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 16px; cursor:pointer; font-family:'Syne',sans-serif; font-size:13px; color:var(--text); font-weight:700; z-index:200; }
.btn-top:hover { border-color:var(--accent); color:var(--accent); }
pre { background:#0d1117; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:12px; overflow-x:auto; margin-top:8px; font-family:'Space Mono',monospace; white-space:pre-wrap; word-break:break-word; color:#cdd9e5; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">🗄️</div>
      <h1>Oracle SQL İmtahan</h1>
      <p>JOIN'ə qədər · Əsas mövzular</p>
    </div>
    <div class="info-bar">
      <div class="info-chip"><div class="val">60</div><div class="lbl">Sual</div></div>
      <div class="info-chip"><div class="val">120</div><div class="lbl">Dəqiqə</div></div>
      <div class="info-chip"><div class="val">36</div><div class="lbl">Keçid balı</div></div>
    </div>
    <div class="form-group">
      <label>Ad</label>
      <input type="text" id="inp-name" placeholder="Adınızı daxil edin">
      <div class="err-msg" id="err-name">Ad daxil edin</div>
    </div>
    <div class="form-group">
      <label>Soyad</label>
      <input type="text" id="inp-surname" placeholder="Soyadınızı daxil edin">
      <div class="err-msg" id="err-surname">Soyad daxil edin</div>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="inp-email" placeholder="email@example.com">
      <div class="err-msg" id="err-email">Düzgün email daxil edin</div>
    </div>
    <button class="btn-start" onclick="startExam()">🚀 İmtahana Başla</button>
  </div>
</div>

<!-- EXAM -->
<div id="examScreen" class="screen">
  <div class="exam-header">
    <div class="exam-title-sm">Oracle SQL</div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">0 / 60 cavablandı</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="timer-block">
      <span>⏱</span>
      <span class="timer-val" id="timer">120:00</span>
    </div>
  </div>
  <div class="exam-body" id="examBody"></div>
  <div class="submit-area">
    <button class="btn-submit" onclick="confirmSubmit()">📤 İmtahanı Bitir</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-header">
    <div class="student-info-res" id="resStudentInfo"></div>
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner">
        <div class="score-num" id="scoreNum">0/60</div>
        <div class="score-label">NƏTİCƏ</div>
      </div>
    </div>
    <div class="verdict" id="verdictText"></div>
    <div class="motivate" id="motivateText"></div>
    <div class="stats-row">
      <div class="stat-chip"><div class="sv" id="sCorrect" style="color:var(--success)">0</div><div class="sl">Düzgün</div></div>
      <div class="stat-chip"><div class="sv" id="sWrong" style="color:var(--danger)">0</div><div class="sl">Səhv</div></div>
      <div class="stat-chip"><div class="sv" id="sUnanswered" style="color:var(--text2)">0</div><div class="sl">Cavabsız</div></div>
      <div class="stat-chip"><div class="sv" id="sTime" style="color:var(--warning)">0:00</div><div class="sl">Vaxt</div></div>
    </div>
  </div>
  <div class="result-body">
    <div class="section-title">📚 Təkrar edilməli mövzular</div>
    <div class="topics-grid" id="topicsGrid"></div>
    <div class="section-title">🔍 Sualların Təhlili</div>
    <div id="reviewContainer"></div>
  </div>
  <button class="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Yuxarı</button>
</div>

<script>
// ═══════════════════════════════════════════
// 60 SUAL - JOIN'Ə QƏDƏR MÖVZULAR
// ═══════════════════════════════════════════
const questions = [
  {
    n:1, type:'single', topic:'SELECT / FROM / WHERE',
    text:'Employees cədvəlində salary 5000-dən çox olan işçilərin adlarını göstər. Hansı SELECT işçidir düzgün?',
    opts:[
      'A. SELECT * FROM employees WHERE salary > 5000;',
      'B. SELECT first_name, salary FROM employees WHERE salary > 5000;',
      'C. SELECT last_name FROM employees WHERE salary > 5000;',
      'D. SELECT all columns FROM employees WHERE salary > 5000;'
    ],
    answer:[1]
  },
  {
    n:2, type:'single', topic:'ORDER BY / ASC / DESC',
    text:'Təlimçiləri maaş əsasında azalan qaydada sıralamaq üçün hansı clause istifadə olunur?',
    opts:[
      'A. SELECT * FROM employees ORDER BY salary;',
      'B. SELECT * FROM employees ORDER BY salary DESC;',
      'C. SELECT * FROM employees DESC BY salary;',
      'D. SELECT * FROM employees SORT BY salary DESC;'
    ],
    answer:[1]
  },
  {
    n:3, type:'single', topic:'DISTINCT',
    text:'Departments cədvəlində neçə fərqli şəhər var? Hansı sorğu düzgündür?',
    opts:[
      'A. SELECT * FROM departments;',
      'B. SELECT city FROM departments;',
      'C. SELECT DISTINCT city FROM departments;',
      'D. SELECT city FROM departments DISTINCT;'
    ],
    answer:[2]
  },
  {
    n:4, type:'single', topic:'NULL / NVL',
    text:'Commission NULL ola biləcəyi ehtimalına qarşı, maaş + komisyon hesablamaq üçün düzgün ifadə hansıdır?',
    opts:[
      'A. SELECT salary + commission FROM employees;',
      'B. SELECT salary + NVL(commission, 0) FROM employees;',
      'C. SELECT salary + ISNULL(commission, 0) FROM employees;',
      'D. SELECT salary + COALESCE(commission) FROM employees;'
    ],
    answer:[1]
  },
  {
    n:5, type:'single', topic:'String Functions / UPPER / LOWER',
    text:'Əmployee adlarını böyük hərflərlə göstərmək üçün hansı funksiya istifadə olunur?',
    opts:[
      'A. SELECT UPPERCASE(name) FROM employees;',
      'B. SELECT UPPER(name) FROM employees;',
      'C. SELECT TO_UPPER(name) FROM employees;',
      'D. SELECT name UPPER FROM employees;'
    ],
    answer:[1]
  },
  {
    n:6, type:'single', topic:'String Functions / LENGTH / SUBSTR',
    text:'\'Oracle\' sözünün uzunluğu nədir? LENGTH(\'Oracle\') nəticə verər?',
    opts:[
      'A. 5',
      'B. 6',
      'C. 7',
      'D. ERROR'
    ],
    answer:[1]
  },
  {
    n:7, type:'single', topic:'String Functions / CONCAT / ||',
    text:'First_name və last_name birləşdirmək üçün düzgün sintaksis hansıdır?',
    opts:[
      'A. SELECT first_name || last_name FROM employees;',
      'B. SELECT first_name + last_name FROM employees;',
      'C. SELECT CONCAT(first_name, last_name) FROM employees;',
      'D. SELECT first_name + \' \' + last_name FROM employees;'
    ],
    answer:[0]
  },
  {
    n:8, type:'single', topic:'Number Functions / ROUND / TRUNC',
    text:'155.567 sayını 2 onluğa qədər yuvarlaqlaşdırmaq üçün nəticə nə olur?',
    opts:[
      'A. ROUND(155.567, 2) = 155.56',
      'B. ROUND(155.567, 2) = 155.57',
      'C. TRUNC(155.567, 2) = 155.57',
      'D. MOD(155.567, 2) = 155.57'
    ],
    answer:[1]
  },
  {
    n:9, type:'single', topic:'Number Functions / MOD / ABS',
    text:'MOD(17, 5) nəticə nədir?',
    opts:[
      'A. 2',
      'B. 3',
      'C. 4',
      'D. 5'
    ],
    answer:[0]
  },
  {
    n:10, type:'single', topic:'Date Functions / SYSDATE / TRUNC',
    text:'Bugünün tarixini (vaxt olmadan) almaq üçün hansı funksiya istifadə olunur?',
    opts:[
      'A. SELECT SYSDATE FROM DUAL;',
      'B. SELECT TODAY FROM DUAL;',
      'C. SELECT TRUNC(SYSDATE) FROM DUAL;',
      'D. SELECT CURRENT_DATE FROM DUAL;'
    ],
    answer:[2]
  },
  {
    n:11, type:'single', topic:'Date Functions / MONTHS_BETWEEN',
    text:'İki tarix arasındakı ayları hesablamaq üçün hansı funksiya istifadə olunur?',
    opts:[
      'A. SELECT DATE_DIFF(hire_date, SYSDATE) FROM employees;',
      'B. SELECT DATEDIFF(MONTH, hire_date, SYSDATE) FROM employees;',
      'C. SELECT MONTHS_BETWEEN(SYSDATE, hire_date) FROM employees;',
      'D. SELECT DAYS(SYSDATE, hire_date) FROM employees;'
    ],
    answer:[2]
  },
  {
    n:12, type:'single', topic:'Date Functions / ADD_MONTHS / TO_DATE',
    text:'Tarixə 6 ay əlavə etmək üçün düzgün funksiya hansıdır?',
    opts:[
      'A. SELECT ADD_DATE(hire_date, 6) FROM employees;',
      'B. SELECT ADD_MONTHS(hire_date, 6) FROM employees;',
      'C. SELECT hire_date + 6 FROM employees;',
      'D. SELECT DATEADD(month, 6, hire_date) FROM employees;'
    ],
    answer:[1]
  },
  {
    n:13, type:'single', topic:'TO_CHAR / Date Formatting',
    text:'Tarix \'15-JAN-2023\' formatında göstərmək üçün düzgün kod hansıdır?',
    opts:[
      'A. SELECT TO_CHAR(hire_date, \'DD-MON-YYYY\') FROM employees;',
      'B. SELECT TO_DATE(hire_date, \'DD-MON-YYYY\') FROM employees;',
      'C. SELECT FORMAT(hire_date, \'DD-MON-YYYY\') FROM employees;',
      'D. SELECT hire_date AS \'DD-MON-YYYY\' FROM employees;'
    ],
    answer:[0]
  },
  {
    n:14, type:'single', topic:'TO_NUMBER / Conversion',
    text:'Mətn \'12345\' -ı rəqəmə çevirmək üçün hansı funksiya istifadə olunur?',
    opts:[
      'A. SELECT CAST(\'12345\' AS NUMBER) FROM DUAL;',
      'B. SELECT TO_NUMBER(\'12345\') FROM DUAL;',
      'C. SELECT CONVERT(\'12345\', NUMBER) FROM DUAL;',
      'D. A və B hər ikisi düzgündür'
    ],
    answer:[3]
  },
  {
    n:15, type:'single', topic:'COUNT / Aggregate Functions',
    text:'Employees cədvəlində neçə işçi var? Düzgün sorğu hansıdır?',
    opts:[
      'A. SELECT COUNT(*) FROM employees;',
      'B. SELECT COUNT(employee_id) FROM employees;',
      'C. SELECT SUM(*) FROM employees;',
      'D. SELECT TOTAL(*) FROM employees;'
    ],
    answer:[0]
  },
  {
    n:16, type:'single', topic:'SUM / AVG / Aggregate Functions',
    text:'Employees cədvəlində ortaya maaş nədir? Düzgün sorğu hansıdır?',
    opts:[
      'A. SELECT AVG(salary) FROM employees;',
      'B. SELECT AVERAGE(salary) FROM employees;',
      'C. SELECT SUM(salary)/COUNT(*) FROM employees;',
      'D. A və C hər ikisi düzgündür'
    ],
    answer:[3]
  },

const PASS_SCORE = 36;
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTIK1Kf2v21b6kDnjNTIQeQjGLYticlZrM5D6udGmKXzGKOsGGx1y-kZ6ewjxIGZPy/exec';

let studentName='', studentEmail='';
let timeLeft = 120*60;
let timerInterval = null;
let startTime = null;
let userAnswers = {};

function $(id){ return document.getElementById(id); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function fmtTime(sec){ const m=Math.floor(sec/60),s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }

// LOGIN
function startExam(){
  const name=$('inp-name').value.trim(), surname=$('inp-surname').value.trim(), email=$('inp-email').value.trim();
  let ok=true;
  $('err-name').style.display=name?'none':'block'; if(!name)ok=false;
  $('err-surname').style.display=surname?'none':'block'; if(!surname)ok=false;
  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  $('err-email').style.display=emailOk?'none':'block'; if(!emailOk)ok=false;
  if(!ok)return;
  studentName=name+' '+surname; studentEmail=email;
  buildExam(); showScreen('examScreen'); startTimer();
}

// BUILD EXAM
function buildExam(){
  const body=$('examBody'); body.innerHTML='';
  questions.forEach((q,qi)=>{
    const card=document.createElement('div'); card.className='question-card'; card.id='qcard-'+qi;
    const typeNote=q.type==='multi'?'<div class="q-note">⚠️ Birdən çox cavab seçin</div>':'';
    let optsHtml=q.opts.map((opt,oi)=>{
      const it=q.type==='multi'?'checkbox':'radio';
      const nm=q.type==='single'?'name="q'+qi+'"':'';
      return '<label class="opt-label" id="opt-'+qi+'-'+oi+'"><input type="'+it+'" '+nm+' value="'+oi+'" onchange="recordAnswer('+qi+','+oi+',this)"><span>'+opt.replace(/\n/g,'<br>')+'</span></label>';
    }).join('');
    card.innerHTML='<div class="q-header"><div class="q-num">S-'+q.n+'</div><div><div class="q-text">'+q.text.replace(/\n/g,'<br>')+'</div>'+typeNote+'</div></div><div class="options">'+optsHtml+'</div>';
    body.appendChild(card);
  });
}

// RECORD ANSWER
function recordAnswer(qi,oi,el){
  const q=questions[qi];
  if(q.type==='single'){
    userAnswers[qi]=[oi];
    q.opts.forEach((_,i)=>{ const l=document.getElementById('opt-'+qi+'-'+i); if(l)l.classList.toggle('selected',i===oi); });
  } else {
    if(!userAnswers[qi])userAnswers[qi]=[];
    if(el.checked){ if(!userAnswers[qi].includes(oi))userAnswers[qi].push(oi); }
    else { userAnswers[qi]=userAnswers[qi].filter(x=>x!==oi); }
    const l=document.getElementById('opt-'+qi+'-'+oi); if(l)l.classList.toggle('selected',el.checked);
  }
  updateProgress();
}

function updateProgress(){
  const answered=Object.keys(userAnswers).filter(k=>userAnswers[k]&&userAnswers[k].length>0).length;
  const pct=Math.round(answered/questions.length*100);
  $('prog-text').textContent=answered+' / '+questions.length+' cavablandı';
  $('prog-pct').textContent=pct+'%';
  $('prog-fill').style.width=pct+'%';
}

// TIMER
function startTimer(){
  startTime=Date.now();
  timerInterval=setInterval(()=>{
    timeLeft--;
    const tv=$('timer'); tv.textContent=fmtTime(timeLeft);
    if(timeLeft<=300)tv.className='timer-val warn';
    if(timeLeft<=60)tv.className='timer-val danger';
    if(timeLeft<=0){clearInterval(timerInterval);submitExam();}
  },1000);
}

// SUBMIT
function confirmSubmit(){
  const answered=Object.keys(userAnswers).filter(k=>userAnswers[k]&&userAnswers[k].length>0).length;
  const unanswered=questions.length-answered;
  showModal(unanswered>0?unanswered+' sual cavabsız qalıb. Yenə də bitirmək istəyirsiniz?':'İmtahanı bitirmək istədiyinizə əminsinizmi?',submitExam);
}

function showModal(msg,onConfirm){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML='<div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center;font-family:Syne,sans-serif;"><div style="font-size:36px;margin-bottom:12px;">⚠️</div><p style="font-size:15px;line-height:1.6;margin-bottom:24px;color:#e8edf5;">'+msg+'</p><div style="display:flex;gap:12px;justify-content:center;"><button onclick="this.closest(\'div[style]\').remove()" style="padding:12px 24px;background:#1a2236;border:1px solid #1e2d45;border-radius:10px;color:#8899aa;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Ləğv et</button><button id="mc-btn" style="padding:12px 24px;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:10px;color:#fff;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Bəli, bitir</button></div></div>';
  document.body.appendChild(overlay);
  document.getElementById('mc-btn').onclick=()=>{overlay.remove();onConfirm();};
}

function submitExam(){
  clearInterval(timerInterval);
  const elapsed=Math.round((Date.now()-startTime)/1000);
  buildResult(elapsed);
  showScreen('resultScreen');
  window.scrollTo(0,0);
  sendToSheets(elapsed);
}

// SEND TO SHEETS
function sendToSheets(elapsed){
  let correct=0,wrong=0,unanswered=0;
  questions.forEach((q,qi)=>{
    const ua=userAnswers[qi];
    if(!ua||ua.length===0)unanswered++;
    else if(answersMatch(ua,q.answer))correct++;
    else wrong++;
  });
  const mins=Math.floor(elapsed/60),secs=elapsed%60;
  fetch(SCRIPT_URL,{
    method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:studentName,email:studentEmail,score:correct,passed:correct>=PASS_SCORE,correct:correct,wrong:wrong,unanswered:unanswered,time:mins+':'+String(secs).padStart(2,'0')})
  }).catch(function(){});
}

// RESULT
function answersMatch(ua,ca){
  if(!ua||ua.length===0)return false;
  const u=[...ua].sort((a,b)=>a-b),c=[...ca].sort((a,b)=>a-b);
  return u.length===c.length&&u.every((v,i)=>v===c[i]);
}

function buildResult(elapsed){
  let correct=0,wrong=0,unanswered=0;
  const topicErrors={};
  questions.forEach((q,qi)=>{
    const ua=userAnswers[qi];
    if(!ua||ua.length===0){unanswered++;}
    else if(answersMatch(ua,q.answer)){correct++;}
    else{wrong++;if(!topicErrors[q.topic])topicErrors[q.topic]=0;topicErrors[q.topic]++;}
  });
  const pct=Math.round(correct/questions.length*100),pass=correct>=PASS_SCORE;
  $('resStudentInfo').textContent=studentName+' · '+studentEmail;
  $('scoreNum').textContent=correct+'/'+questions.length;
  const sc=$('scoreCircle');sc.className='score-circle '+(pass?'pass':'fail');sc.style.setProperty('--pct',pct);
  $('verdictText').className='verdict '+(pass?'pass':'fail');
  $('verdictText').textContent=pass?'✅ KEÇDİNİZ!':'❌ KEÇƏ BİLMƏDİNİZ';
  const pool=pass?['Əla iş! Oracle SQL bilikləriniz möhkəmdir. 🚀','Təbriklər! Ciddi hazırlığınızın göstəricisidir. 🏆']:['Narahat olmayın — zəif mövzuları təkrar edin! 💪','Bu bir başlanğıcdır. Növbəti dəfə keçəcəksiniz! 📚'];
  $('motivateText').textContent=pool[Math.floor(Math.random()*pool.length)];
  $('sCorrect').textContent=correct;$('sWrong').textContent=wrong;$('sUnanswered').textContent=unanswered;
  $('sTime').textContent=fmtTime(elapsed);
  const tg=$('topicsGrid');tg.innerHTML='';
  if(Object.keys(topicErrors).length===0){tg.innerHTML='<p style="color:var(--success);font-weight:700">🎉 Bütün mövzularda uğurlu oldunuz!</p>';}
  else{Object.entries(topicErrors).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{tg.innerHTML+='<div class="topic-chip"><div class="tc-name">📖 '+t+'</div><div class="tc-count">'+c+' səhv</div></div>';});}
  const rc=$('reviewContainer');rc.innerHTML='';
  questions.forEach((q,qi)=>{
    const ua=userAnswers[qi]||[];
    const isCorrect=answersMatch(ua,q.answer),isUnanswered=ua.length===0;
    const status=isUnanswered?'unanswered':(isCorrect?'correct':'wrong');
    const badge=isUnanswered?'<span class="review-badge badge-unanswered">Cavabsız</span>':isCorrect?'<span class="review-badge badge-correct">✓ Düzgün</span>':'<span class="review-badge badge-wrong">✗ Səhv</span>';
    const optsHtml=q.opts.map((opt,oi)=>{
      const isC=q.answer.includes(oi),isSel=ua.includes(oi);
      let cls='';if(isC)cls='r-correct';else if(isSel&&!isC)cls='r-wrong-sel';
      return '<div class="review-opt '+cls+'">'+(isC?'✓ ':(isSel?'✗ ':""))+opt+'</div>';
    }).join('');
    rc.innerHTML+='<div class="review-card '+status+'"><div class="review-q-head">'+badge+'<div class="review-q-text">S-'+q.n+': '+q.text.replace(/\n/g,' ').substring(0,120)+(q.text.length>120?'…':'')+'</div></div><div class="review-opts">'+optsHtml+'</div></div>';
  });
}
</script>
